package com.example.fiveme.ui.screens

import androidx.compose.foundation.background
import androidx.compose.foundation.border
import androidx.compose.foundation.clickable
import androidx.compose.foundation.layout.*
import androidx.compose.foundation.lazy.LazyColumn
import androidx.compose.foundation.lazy.items
import androidx.compose.foundation.shape.CircleShape
import androidx.compose.foundation.shape.RoundedCornerShape
import androidx.compose.material.icons.Icons
import androidx.compose.material.icons.automirrored.filled.ArrowBack
import androidx.compose.material.icons.filled.Add
import androidx.compose.material.icons.filled.Person
import androidx.compose.material3.*
import androidx.compose.runtime.*
import androidx.compose.ui.Alignment
import androidx.compose.ui.Modifier
import androidx.compose.ui.graphics.Color
import androidx.compose.ui.text.font.FontWeight
import androidx.compose.ui.unit.dp
import androidx.compose.ui.unit.sp
import com.example.fiveme.data.User
import com.example.fiveme.ui.FiveMeViewModel

@OptIn(ExperimentalMaterial3Api::class)
@Composable
fun ProfileScreen(
    viewModel: FiveMeViewModel,
    onBack: () -> Unit
) {
    val currentUser by viewModel.currentUser.collectAsState()
    val allUsers by viewModel.allUsers.collectAsState()
    val confirmedFeed by viewModel.confirmedHighFives.collectAsState()

    var showCreateDialog by remember { mutableStateOf(false) }
    var newUsername by remember { mutableStateOf("") }
    var newEmoji by remember { mutableStateOf("✋") }

    // Emojis lists
    val emojis = listOf("✋", "🐱", "🐶", "🦊", "⚡", "🔥", "🚀", "🎮", "🌟", "🍔", "🍕", "🎈")

    // Statistics
    val statsGiven = remember(confirmedFeed, currentUser) {
        confirmedFeed.count { it.senderId == currentUser?.id }
    }
    val statsReceived = remember(confirmedFeed, currentUser) {
        confirmedFeed.count { it.receiverId == currentUser?.id }
    }
    val statsChains = remember(confirmedFeed, currentUser) {
        // Count confirmed high-fives given by current user that inspired other high-fives
        val givenIds = confirmedFeed.filter { it.senderId == currentUser?.id }.map { it.id }.toSet()
        confirmedFeed.count { it.parentHighFiveId in givenIds }
    }

    Scaffold(
        topBar = {
            TopAppBar(
                title = { Text("Profile Management", fontWeight = FontWeight.Bold) },
                navigationIcon = {
                    IconButton(onClick = onBack) {
                        Icon(
                            imageVector = Icons.AutoMirrored.Filled.ArrowBack,
                            contentDescription = "Back",
                            tint = Color.White
                        )
                    }
                },
                colors = TopAppBarDefaults.topAppBarColors(
                    containerColor = DeepDarkBlue,
                    titleContentColor = Color.White
                )
            )
        },
        containerColor = DeepDarkBlue
    ) { innerPadding ->
        Column(
            modifier = Modifier
                .fillMaxSize()
                .padding(innerPadding)
                .padding(16.dp)
        ) {
            // Main user display
            Row(
                verticalAlignment = Alignment.CenterVertically,
                modifier = Modifier
                    .fillMaxWidth()
                    .background(CardSlate, RoundedCornerShape(16.dp))
                    .border(1.dp, BorderColor, RoundedCornerShape(16.dp))
                    .padding(16.dp)
            ) {
                Box(
                    modifier = Modifier
                        .size(64.dp)
                        .background(DeepDarkBlue, CircleShape)
                        .border(2.dp, NeonOrange, CircleShape),
                    contentAlignment = Alignment.Center
                ) {
                    Text(currentUser?.avatarEmoji ?: "👤", fontSize = 32.sp)
                }
                Spacer(modifier = Modifier.width(16.dp))
                Column {
                    Text(
                        text = currentUser?.username ?: "Guest User",
                        color = Color.White,
                        fontSize = 20.sp,
                        fontWeight = FontWeight.Bold
                    )
                    Text(
                        text = "Active Account",
                        color = NeonOrange,
                        fontSize = 12.sp,
                        fontWeight = FontWeight.SemiBold
                    )
                }
            }

            Spacer(modifier = Modifier.height(20.dp))

            // User statistics
            Text(
                text = "Your Statistics",
                color = Color.White,
                fontSize = 16.sp,
                fontWeight = FontWeight.SemiBold,
                modifier = Modifier.padding(bottom = 8.dp)
            )

            Row(
                modifier = Modifier.fillMaxWidth(),
                horizontalArrangement = Arrangement.spacedBy(10.dp)
            ) {
                StatCard(title = "Given", value = statsGiven.toString(), color = NeonOrange, modifier = Modifier.weight(1f))
                StatCard(title = "Received", value = statsReceived.toString(), color = NeonCyan, modifier = Modifier.weight(1f))
                StatCard(title = "Inspired", value = statsChains.toString(), color = NeonGold, modifier = Modifier.weight(1f))
            }

            Spacer(modifier = Modifier.height(24.dp))

            // User Switcher section
            Row(
                modifier = Modifier.fillMaxWidth(),
                horizontalArrangement = Arrangement.SpaceBetween,
                verticalAlignment = Alignment.CenterVertically
            ) {
                Text(
                    text = "Switch Account (Testing)",
                    color = Color.White,
                    fontSize = 16.sp,
                    fontWeight = FontWeight.SemiBold
                )
                Button(
                    onClick = { showCreateDialog = true },
                    colors = ButtonDefaults.buttonColors(containerColor = NeonCyan),
                    shape = RoundedCornerShape(8.dp),
                    contentPadding = PaddingValues(horizontal = 8.dp, vertical = 0.dp),
                    modifier = Modifier.height(28.dp)
                ) {
                    Icon(Icons.Default.Add, contentDescription = null, modifier = Modifier.size(14.dp))
                    Text("Add User", fontSize = 11.sp, fontWeight = FontWeight.Bold)
                }
            }

            Spacer(modifier = Modifier.height(10.dp))

            LazyColumn(
                modifier = Modifier
                    .weight(1f)
                    .border(1.dp, BorderColor, RoundedCornerShape(12.dp))
                    .background(CardSlate, RoundedCornerShape(12.dp))
                    .padding(4.dp),
                verticalArrangement = Arrangement.spacedBy(4.dp)
            ) {
                items(allUsers) { user ->
                    val isActive = user.id == currentUser?.id
                    Row(
                        modifier = Modifier
                            .fillMaxWidth()
                            .clickable { viewModel.switchUser(user.id) }
                            .background(
                                if (isActive) DeepDarkBlue else Color.Transparent,
                                RoundedCornerShape(8.dp)
                            )
                            .padding(12.dp),
                        verticalAlignment = Alignment.CenterVertically
                    ) {
                        Text(user.avatarEmoji, fontSize = 20.sp)
                        Spacer(modifier = Modifier.width(12.dp))
                        Text(
                            text = user.username,
                            color = if (isActive) NeonOrange else Color.White,
                            fontWeight = if (isActive) FontWeight.Bold else FontWeight.Normal,
                            fontSize = 14.sp
                        )
                        Spacer(modifier = Modifier.weight(1f))
                        if (isActive) {
                            Text(
                                text = "Active",
                                color = NeonOrange,
                                fontSize = 11.sp,
                                fontWeight = FontWeight.Bold
                            )
                        }
                    }
                }
            }
        }

        // Create user dialog
        if (showCreateDialog) {
            AlertDialog(
                onDismissRequest = { showCreateDialog = false },
                containerColor = CardSlate,
                title = { Text("Create New User", color = Color.White) },
                text = {
                    Column {
                        OutlinedTextField(
                            value = newUsername,
                            onValueChange = { newUsername = it },
                            label = { Text("Username") },
                            colors = OutlinedTextFieldDefaults.colors(
                                focusedTextColor = Color.White,
                                unfocusedTextColor = Color.White,
                                focusedBorderColor = NeonCyan,
                                unfocusedBorderColor = BorderColor
                            )
                        )
                        Spacer(modifier = Modifier.height(16.dp))
                        Text("Select Avatar:", color = Color.White, fontSize = 13.sp, modifier = Modifier.padding(bottom = 6.dp))
                        Row(
                            horizontalArrangement = Arrangement.spacedBy(6.dp),
                            modifier = Modifier.fillMaxWidth()
                        ) {
                            emojis.take(6).forEach { emoji ->
                                val isSelected = newEmoji == emoji
                                Box(
                                    modifier = Modifier
                                        .size(34.dp)
                                        .background(if (isSelected) DeepDarkBlue else Color.Transparent, CircleShape)
                                        .border(1.dp, if (isSelected) NeonCyan else BorderColor, CircleShape)
                                        .clickable { newEmoji = emoji },
                                    contentAlignment = Alignment.Center
                                ) {
                                    Text(emoji, fontSize = 18.sp)
                                }
                            }
                        }
                        Spacer(modifier = Modifier.height(8.dp))
                        Row(
                            horizontalArrangement = Arrangement.spacedBy(6.dp),
                            modifier = Modifier.fillMaxWidth()
                        ) {
                            emojis.drop(6).take(6).forEach { emoji ->
                                val isSelected = newEmoji == emoji
                                Box(
                                    modifier = Modifier
                                        .size(34.dp)
                                        .background(if (isSelected) DeepDarkBlue else Color.Transparent, CircleShape)
                                        .border(1.dp, if (isSelected) NeonCyan else BorderColor, CircleShape)
                                        .clickable { newEmoji = emoji },
                                    contentAlignment = Alignment.Center
                                ) {
                                    Text(emoji, fontSize = 18.sp)
                                }
                            }
                        }
                    }
                },
                confirmButton = {
                    TextButton(
                        onClick = {
                            if (newUsername.isNotBlank()) {
                                viewModel.createUser(newUsername, newEmoji)
                                newUsername = ""
                                showCreateDialog = false
                            }
                        }
                    ) {
                        Text("Create", color = NeonCyan)
                    }
                },
                dismissButton = {
                    TextButton(onClick = { showCreateDialog = false }) {
                        Text("Cancel", color = TextGray)
                    }
                }
            )
        }
    }
}

@Composable
fun StatCard(
    title: String,
    value: String,
    color: Color,
    modifier: Modifier = Modifier
) {
    Card(
        modifier = modifier.border(1.dp, BorderColor, RoundedCornerShape(12.dp)),
        shape = RoundedCornerShape(12.dp),
        colors = CardDefaults.cardColors(containerColor = CardSlate)
    ) {
        Column(
            horizontalAlignment = Alignment.CenterHorizontally,
            modifier = Modifier
                .fillMaxWidth()
                .padding(12.dp)
        ) {
            Text(title, color = TextGray, fontSize = 11.sp, fontWeight = FontWeight.SemiBold)
            Spacer(modifier = Modifier.height(4.dp))
            Text(value, color = color, fontSize = 22.sp, fontWeight = FontWeight.Bold)
        }
    }
}
